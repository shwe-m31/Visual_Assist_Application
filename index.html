<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionAssist Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080c14;
    --surface:   #0e1420;
    --card:      #131926;
    --border:    #1e2a3a;
    --accent:    #3b82f6;
    --accent-lo: rgba(59,130,246,0.12);
    --accent-gl: rgba(59,130,246,0.06);
    --green:     #22c55e;
    --green-lo:  rgba(34,197,94,0.12);
    --text:      #f0f4ff;
    --muted:     #64748b;
    --sub:       #94a3b8;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 48px;
  }

  /* ── Header ───────────────────────────────────────── */
  header {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-icon {
    width: 36px; height: 36px;
    background: var(--accent-lo);
    border: 1px solid var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }

  .brand-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .brand-name span { color: var(--accent); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    background: var(--green-lo);
    border: 1px solid rgba(34,197,94,0.25);
    border-radius: 99px;
    font-size: 12px;
    color: var(--green);
    font-weight: 500;
  }

  .status-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }

  /* ── Camera card ──────────────────────────────────── */
  .camera-card {
    width: 100%;
    max-width: 480px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }

  .camera-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #050810;
    overflow: hidden;
  }

  video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* corner brackets */
  .corner {
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.7;
    z-index: 2;
  }
  .corner.tl { top:14px; left:14px; border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
  .corner.tr { top:14px; right:14px; border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
  .corner.bl { bottom:14px; left:14px; border-width:0 0 2px 2px; border-radius:0 0 0 4px; }
  .corner.br { bottom:14px; right:14px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }

  /* scan line while detecting */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    z-index: 2;
    top: 0;
  }
  .scanning .scan-line {
    opacity: 1;
    animation: scanDown 1.4s ease-in-out infinite;
  }
  @keyframes scanDown {
    0%   { top: 0%; }
    100% { top: 100%; }
  }

  /* no-feed placeholder */
  .no-feed {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #050810;
    z-index: 1;
  }
  .no-feed-icon { font-size: 36px; opacity: 0.35; }
  .no-feed-text { font-size: 13px; color: var(--muted); }

  /* ── Camera bottom bar ─────────────────────────────── */
  .cam-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
  }

  .cam-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .btn-cam {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn-cam:hover { opacity: 0.88; }
  .btn-cam:disabled { opacity: 0.45; cursor: default; }

  /* ── Result card ──────────────────────────────────── */
  .result-card {
    width: 100%;
    max-width: 480px;
    margin-top: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }

  .result-title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .confidence-chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    background: var(--accent-lo);
    color: var(--accent);
    font-weight: 500;
    display: none;
  }

  .result-body {
    padding: 18px;
    min-height: 72px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .result-icon-wrap {
    flex-shrink: 0;
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--accent-lo);
    border: 1px solid rgba(59,130,246,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .result-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.45;
    color: var(--text);
  }

  .result-text.idle { color: var(--muted); font-weight: 400; font-size: 14px; }

  /* ── Action row ───────────────────────────────────── */
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 480px;
    margin-top: 12px;
  }

  .btn-action {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--sub);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background .2s, border-color .2s, color .2s;
  }
  .btn-action:hover {
    background: var(--accent-lo);
    border-color: var(--accent);
    color: var(--text);
  }
  .btn-action.active {
    background: var(--accent-lo);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Footer ───────────────────────────────────────── */
  footer {
    margin-top: 28px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="brand">
    <div class="brand-icon">👁</div>
    <span class="brand-name">Vision<span>Assist</span> Pro</span>
  </div>
  <div class="status-pill" id="statusPill">
    <div class="status-dot"></div>
    <span id="statusText">Loading…</span>
  </div>
</header>

<!-- Camera card -->
<div class="camera-card" id="cameraCard">
  <div class="camera-frame" id="cameraFrame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line" id="scanLine"></div>
    <div class="no-feed" id="noFeed">
      <div class="no-feed-icon">📷</div>
      <span class="no-feed-text">Camera inactive</span>
    </div>
    <video id="video" autoplay playsinline></video>
  </div>
  <div class="cam-bar">
    <span class="cam-label">Live Feed</span>
    <button class="btn-cam" id="startBtn" onclick="startCamera()">
      ▶ Start Camera
    </button>
  </div>
</div>

<!-- Result card -->
<div class="result-card">
  <div class="result-header">
    <span class="result-title">Detection Result</span>
    <span class="confidence-chip" id="chip">Live</span>
  </div>
  <div class="result-body">
    <div class="result-icon-wrap" id="resultIcon">🔍</div>
    <span class="result-text idle" id="result">Start the camera to begin detection.</span>
  </div>
</div>

<!-- Action buttons -->
<div class="action-row">
  <button class="btn-action" onclick="capture()">🔍 Analyze Now</button>
  <button class="btn-action" id="speakBtn" onclick="speak()">🔊 Read Aloud</button>
</div>

<footer>Auto-detects every 3 seconds · TensorFlow COCO-SSD</footer>

<script>
  let stream, description = "", model;
  let autoSpeak = false;

  async function loadModel() {
    setStatus("Loading AI…", false);
    model = await cocoSsd.load();
    setStatus("AI Ready", true);
    document.getElementById("result").textContent = "Camera not started yet.";
    startCamera();
  }

  function setStatus(text, ok) {
    document.getElementById("statusText").textContent = text;
    const pill = document.getElementById("statusPill");
    pill.style.background  = ok ? "var(--green-lo)"               : "rgba(234,179,8,0.12)";
    pill.style.borderColor = ok ? "rgba(34,197,94,0.25)"          : "rgba(234,179,8,0.25)";
    pill.style.color       = ok ? "var(--green)"                  : "#eab308";
    pill.querySelector('.status-dot').style.background = ok ? "var(--green)" : "#eab308";
  }

  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
      stream = s;
      const video = document.getElementById("video");
      video.srcObject = stream;
      document.getElementById("noFeed").style.display = "none";
      document.getElementById("startBtn").disabled = true;
      document.getElementById("startBtn").textContent = "● Live";
      document.getElementById("chip").style.display = "inline-block";
      setStatus("Detecting", true);
      setInterval(autoDetect, 3000);
    }).catch(() => setStatus("Camera error", false));
  }

  function capture() { autoDetect(); }

  async function autoDetect() {
    const video = document.getElementById("video");
    if (!model || !stream) return;
    document.getElementById("cameraFrame").classList.add("scanning");
    const predictions = await model.detect(video);
    document.getElementById("cameraFrame").classList.remove("scanning");

    const resultEl = document.getElementById("result");
    const iconEl   = document.getElementById("resultIcon");
    resultEl.classList.remove("idle");

    if (predictions.length > 0) {
      const top = predictions[0].class;
      if (top === "person") {
        description = "Person detected in front of you.";
        iconEl.textContent = "🧍";
      } else {
        description = "Object detected: " + top;
        iconEl.textContent = "📦";
      }
      resultEl.textContent = description;
      speak();
    } else {
      description = "No object detected.";
      iconEl.textContent = "🔍";
      resultEl.textContent = description;
    }
  }

  function speak() {
    if (!description) return;
    const utter = new SpeechSynthesisUtterance(description);
    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
    const btn = document.getElementById("speakBtn");
    btn.classList.add("active");
    utter.onend = () => btn.classList.remove("active");
  }

  loadModel();
</script>
</body>
</html>
